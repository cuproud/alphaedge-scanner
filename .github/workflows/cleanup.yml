name: Cleanup Logs

on:
  schedule:
    - cron: '0 6 * * 0'   # Sunday 6 AM UTC = 1-2 AM ET (in quiet hours)
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run cleanup
        run: python3 cleanup_logs.py

      - name: Commit cleanup result
        run: |
          if [[ -n "$(git status --porcelain logs/)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add logs/
            git commit -m "chore: weekly log cleanup (30d retention)" || true
            git push || true
          else
            echo "No log changes to commit."
          fi
