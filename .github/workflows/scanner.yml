name: AlphaEdge Scanner

on:
  schedule:
    # 📈 STOCKS: Every 15 min during US market hours (9:30 AM - 4:00 PM EST/EDT)
    # Covers both EST (UTC-5, winter) and EDT (UTC-4, summer)
    - cron: '30,45 13 * * 1-5'
    - cron: '*/15 14-20 * * 1-5'
    - cron: '0 21 * * 1-5'
    
    # 🪙 CRYPTO/GOLD (24/7): Every hour outside market hours + weekends
    - cron: '0 0-13 * * 1-5'
    - cron: '0 22,23 * * 1-5'
    - cron: '0 * * * 0,6'
  
  workflow_dispatch:

concurrency:
  group: alphaedge-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # ⭐ UPDATED: Cache BOTH state files with better key strategy
      - name: Restore scanner state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            alert_cache.json
            active_trades.json
          key: scanner-state-${{ github.run_id }}
          restore-keys: |
            scanner-state-
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run AlphaEdge Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: America/New_York
        run: python scanner.py
      
      # ⭐ NEW: Save state AFTER the scan (always runs, even if scan fails)
      - name: Save scanner state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            alert_cache.json
            active_trades.json
          key: scanner-state-${{ github.run_id }}
