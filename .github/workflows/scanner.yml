name: AlphaEdge Scanner v5.2

on:
  schedule:
    # 📈 REGULAR MARKET (9:30 AM - 4:00 PM EDT) — every 10 min (public repo = unlimited)
    - cron: '30,40,50 13 * * 1-5'
    - cron: '*/10 14-19 * * 1-5'
    - cron: '0 20 * * 1-5'
    
    # 🌙 AFTER-HOURS (4:00 PM - 8:00 PM EDT) — every 15 min
    - cron: '15,30,45 20 * * 1-5'
    - cron: '*/15 21-23 * * 1-5'
    
    # 🌅 PRE-MARKET (4:00 AM - 9:30 AM EDT) — every 15 min
    - cron: '*/15 8-13 * * 1-5'
    
    # 🌑 OVERNIGHT (8:00 PM - 4:00 AM EDT) — every 30 min crypto
    - cron: '0,30 0-7 * * 1-5'
    
    # 🪙 WEEKENDS — every 30 min
    - cron: '*/30 * * * 0,6'
  
  workflow_dispatch:

concurrency:
  group: alphaedge-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Restore scanner state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            alert_cache.json
            active_trades.json
            trade_history.json
            scanner_state.json
            logs/
          key: scanner-state-${{ github.run_id }}
          restore-keys: |
            scanner-state-
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run AlphaEdge Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: America/New_York
        run: python scanner.py
      
      - name: Save scanner state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            alert_cache.json
            active_trades.json
            trade_history.json
            scanner_state.json
            logs/
          key: scanner-state-${{ github.run_id }}
      
      - name: Upload scan logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scanner-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore
