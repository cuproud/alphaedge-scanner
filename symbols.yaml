# ═══════════════════════════════════════════════════════════════════════════════
# ALPHAEDGE UNIVERSE CONFIGURATION  v4.0
# ═══════════════════════════════════════════════════════════════════════════════
#
# PURPOSE
#   Single source of truth for ALL scanners (intel, brief, dip, scanner).
#   Edit here → restart any scanner → changes take effect immediately.
#
# SCHEMA (per stock — all fields unless marked optional)
#   symbol      "TICKER"                  yfinance-compatible ticker (required, unique)
#   name        "Company Inc."            Clean display name — no status notes (required)
#   exchange    "NASDAQ"|"NYSE"|"CRYPTO"|"COMEX"
#   asset_class "stock"|"crypto"|"commodity"   drives session + alert logic
#   emoji       "💎"                      single emoji for Telegram; MUST be globally unique
#   sector      "AI / Semis"              PRIMARY — used for bleed/leadership math.
#                                         Must be in sectors_canonical. Sectors need
#                                         ≥ 2 members for bleed math to work.
#   tags        ["Defense","Cybersecurity"]  secondary labels (optional list)
#   roles       ["intel","brief","dip"]   which scanners include this asset:
#                 intel   → real-time drop/spike alerts
#                 brief   → morning/evening digest  (requires intel also set)
#                 dip     → RSI/drop dip scanner
#                 scanner → custom/future scanner
#   session     "regular"|"extended"|"24h"
#                 regular  → 09:30–16:00 ET
#                 extended → 04:00–20:00 ET (pre + post market)
#                 24h      → no session filtering (crypto, futures)
#
# VALIDATION RULES (enforced by loader)
#   • symbol must be unique across entire universe
#   • emoji must be globally unique (Telegram disambiguation)
#   • sector must be in sectors_canonical list at bottom of file
#   • asset_class ∈ {stock, crypto, commodity}
#   • roles must be subset of {intel, brief, dip, scanner}
#   • "brief" role requires "intel" role on the same entry
#   • crypto/commodity → session must be "24h"
#   • sectors with < 2 members → bleed/leadership alerts suppressed
#
# DATA QUALITY NOTES
#   GC=F   Gold continuous futures roll monthly — expect price gaps on roll dates.
#          yfinance returns the front-month contract.
#   NVO    Novo Nordisk ADR (NYSE). Primary listing is NOVO-B on Copenhagen.
#          yfinance NVO returns ADR data; volume will differ from primary.
#   SNDK   Post-spin SanDisk Corp. (spun from WD in 2024). Limited price history
#          before spin date; ATH-based dip logic may be unreliable until ~12mo data.
#   MSTR   MicroStrategy is a BTC treasury company, not a miner. Placed in
#          "Crypto-Adj" sector so bleed math correctly groups it with COIN/HOOD/SOFI.
#   COIN   Coinbase is a crypto exchange, not a miner. Same sector fix as MSTR.
#   UAMY   Micro-cap (~$50M). High volatility; intel alerts expected to fire often.
#          Set cooldown_hours higher or add min_market_cap guard in code if noisy.
#   WGRX   Small-cap healthcare. No dip role — price history thin, ATH math unreliable.
#
# CHANGELOG
#   v4.0  2025-05  Full audit pass.
#                  Fixed: 11 duplicate emoji conflicts (all resolved with unique glyphs).
#                  Fixed: MSTR + COIN moved from "Crypto Mining" → "Crypto-Adj" sector.
#                  Fixed: "Crypto-Adj" added to sectors_canonical (was missing).
#                  Fixed: EV/Auto, Materials, Safe Haven, Streaming each had 1 member —
#                         bleed math would divide by zero / be meaningless. Added
#                         RIVN to EV/Auto, SLV to Safe Haven, DIS to Streaming,
#                         MP to Materials so each sector has ≥ 2 members.
#                  Fixed: SNDK name cleaned ("SanDisk Corp." — spin status → tags).
#                  Fixed: QUBT roles aligned with peer quantum names (added intel+brief).
#                  Fixed: AVGO + TSM promoted to intel+brief (large-cap sector leaders).
#                  Improved: dip_scanner.rsi_max lowered 48 → 42 (was catching non-dips).
#                  Improved: dip_scanner.drop_1d_max tightened -1.5 → -2.0 (reduce noise).
#                  Improved: dip_scanner.cooldown_hours raised 4 → 8 (reduce dip spam).
#                  Improved: intel cooldown stays at 4h; dip cooldown now independent.
#   v3.0  prior    Original release.
#
# ═══════════════════════════════════════════════════════════════════════════════

