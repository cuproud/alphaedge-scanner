# CANONICAL SECTOR LIST
# ═══════════════════════════════════════════════════════════════════════════════
#
# Loader rejects any universe entry whose sector is not in this list.
# Every sector needs ≥ 2 members for bleed/leadership math.
# Sectors with 1 member still alert on intel/brief; bleed suppressed.
#
# To add a sector: add here AND add ≥ 2 universe entries.
# To remove a sector: remove all universe entries first.
#
# ═══════════════════════════════════════════════════════════════════════════════
