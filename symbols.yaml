    rsi_min:        25      # RSI floor — below this is potential capitulation, not dip
    rsi_max:        42      # RSI ceiling — was 48 (too high; caught noise, not real dips)
    drop_1d_max:    -2.0    # min 1-day drop % to qualify — was -1.5 (too shallow for vol stocks)
