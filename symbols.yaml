# ═══════════════════════════════════════════════════════════════
# SCANNER SETTINGS — applied at startup by the loader.
# Any value not present falls back to the dataclass default in code.
# ═══════════════════════════════════════════════════════════════
settings:
  intel:
    big_drop_warn:        -5.0
    big_drop_critical:   -10.0
    big_gain_alert:        8.0
    cooldown_hours:        4
    sector_bleed_cooldown: 4
    leadership_cooldown:   3

  brief:
    morning_window:  ["08:45", "12:00"]
    evening_window:  ["16:15", "20:00"]
    fetch_workers:   5

  dip_scanner:
    rsi_min:        25
    rsi_max:        48
    drop_1d_max:    -1.5
    drop_5d_max:    -4.0
    ath_min:        -30.0
    vol_ratio_min:   0.6
    cooldown_hours:  4
    fetch_workers:   5
    max_loss_pct:    8.0
