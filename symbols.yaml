# ───────────────────────────────────────────────────────────────────────────────
# DRONES / DEFENSE-TECH  (new sector v5.1)
#
# Pure-play autonomous systems and unmanned aerial vehicles.
# High-beta — all get loosened dip thresholds.
# RKLB stays in Space (launch vehicles, not drones).
# ───────────────────────────────────────────────────────────────────────────────

  - symbol: "ONDS"
    name: "Ondas Inc."
    exchange: "NASDAQ"
    asset_class: "stock"
    emoji: "🤖"
    sector: "Drones / Defense-Tech"
    session: "regular"
    tags: ["Autonomous-Systems","Defense","Wireless"]
    roles: ["intel","brief","dip","scanner"]
    dip_overrides:
      rsi_max: 50         # very high volatility — up 450%+ past year
      drop_1d_max: -5.0
      drop_5d_max: -12.0
      max_loss_pct: 20.0
    # Autonomous aerial + ground robot intelligence. Defense drones +
    # secure private wireless (FullMAX SDR). ~$9 stock, ~$1B market cap.
    # 800%+ YoY revenue growth. High short interest (33% of float) → squeeze risk.

  - symbol: "KTOS"
    name: "Kratos Defense & Security Solutions"
    exchange: "NASDAQ"
    asset_class: "stock"
    emoji: "✈️"
    sector: "Drones / Defense-Tech"
    session: "regular"
    tags: ["Tactical-Drones","Defense","Expendable-UAS"]
    roles: ["intel","brief","dip","scanner"]
    dip_overrides:
      rsi_max: 48
      drop_1d_max: -4.0
      drop_5d_max: -10.0
      max_loss_pct: 15.0
    # Tactical + expendable drones (XQ-58 Valkyrie), satellite comms,
    # missile defense. Up ~72% YTD, 280%+ past year. More liquid than ONDS.
    # Direct beneficiary of $1T+ US defense budget drone spending.

  - symbol: "AVAV"
    name: "AeroVironment Inc."
    exchange: "NASDAQ"
    asset_class: "stock"
    emoji: "🪃"
    sector: "Drones / Defense-Tech"
    session: "regular"
    tags: ["Military-UAS","Switchblade","Loitering-Munition"]
    roles: ["intel","brief","dip","scanner"]
    dip_overrides:
      rsi_max: 46         # more established — slightly tighter than pure speculative
      drop_1d_max: -3.5
      drop_5d_max: -8.0
      max_loss_pct: 12.0
    # Most established pure-play military UAS. Switchblade loitering munition
    # + Puma recon drones. ~$10B market cap — most liquid drone name.
    # Expanding into AI swarming. Strong government contract backlog.

  - symbol: "RCAT"
    name: "Red Cat Holdings"
    exchange: "NASDAQ"
    asset_class: "stock"
    emoji: "🐱"
    sector: "Drones / Defense-Tech"
    session: "regular"
    tags: ["Counter-Drone","AI","Small-Cap-Speculative"]
    roles: ["intel","brief","dip","scanner"]
    dip_overrides:
      rsi_max: 52         # most speculative of the group
      drop_1d_max: -6.0
      drop_5d_max: -15.0
      max_loss_pct: 25.0
    # Counter-drone + AI capabilities. Teal Drones subsidiary supplies
    # Army SRR program. Highest risk/reward in the sector.
    # Small-cap — expect thin volume and large daily swings.


