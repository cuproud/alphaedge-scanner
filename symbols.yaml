# ═══════════════════════════════════════════════════════════════════════════════
# ALPHAEDGE UNIVERSE CONFIGURATION  v5.0
# ═══════════════════════════════════════════════════════════════════════════════
#
# PURPOSE
#   Single source of truth for ALL scanners (intel, brief, dip, scanner).
#   Edit here → restart any scanner → changes take effect immediately.
#
# SCHEMA (per entry — all fields unless marked optional)
#   symbol        "TICKER"              yfinance-compatible (required, unique).
#                                       TSX-listed ETFs MUST use ".TO" suffix
#                                       (e.g. "XIU.TO") or yfinance returns no data.
#   name          "Name"                Clean display name, no status notes (required).
#   exchange      "NASDAQ"|"NYSE"|"CBOE"|"TSX"|"CRYPTO"|"COMEX"
#   asset_class   "stock"|"etf"|"crypto"|"commodity"
#   emoji         "💎"                  Globally unique — Telegram disambiguation.
#   sector        "AI / Semis"          PRIMARY for bleed/leadership math.
#                                       Must be in sectors_canonical.
#                                       Each sector needs ≥ 2 members.
#   tags          ["tag1","tag2"]       Secondary labels (optional).
#   roles         ["intel","brief","dip","scanner"]
#                   intel   → real-time drop/spike alerts
#                   brief   → morning/evening digest (requires "intel")
#                   dip     → RSI/drop dip scanner
#                   scanner → custom/future scanner
#                 ETFs typically get intel+brief only (not dip — ETFs don't
#                 dip-buy the same way individual names do). Exceptions noted.
#   session       "regular"|"extended"|"24h"
#                   regular  → 09:30–16:00 ET
#                   extended → 04:00–20:00 ET
#                   24h      → no session filter (crypto, futures)
#   dip_overrides (optional block) — per-entry overrides for dip_scanner defaults.
#                 Use for high-beta names where global defaults are too tight,
#                 or low-beta names where defaults are too loose.
#                 Any key not listed falls back to dip_scanner settings below.
#                 Valid keys: rsi_min, rsi_max, drop_1d_max, drop_5d_max,
#                             ath_min, vol_ratio_min, cooldown_hours, max_loss_pct
#
# VOLATILITY TIERS (drives dip_overrides presets — see settings.dip_tiers)
#   high_beta   Quantum, Crypto Mining, EV/Auto, Space, small-cap speculative
#               → RSI ceiling raised to 48, drop thresholds loosened
#   standard    AI/Semis, AI Software, Mega Tech, Streaming, Consumer
#               → global dip_scanner defaults apply (no overrides needed)
#   low_beta    Safe Haven, Fintech payment rails, Healthcare large-caps, Canadian ETFs
#               → RSI ceiling lowered to 38, drop thresholds tightened
#
# VALIDATION RULES (enforced by loader)
#   • symbol must be unique
#   • emoji must be globally unique
#   • sector must be in sectors_canonical
#   • asset_class ∈ {stock, etf, crypto, commodity}
#   • roles ⊆ {intel, brief, dip, scanner}
#   • "brief" requires "intel"
#   • crypto/commodity → session must be "24h"
#   • ETFs → asset_class must be "etf"
#   • TSX-listed ETFs → symbol must end in ".TO"
#   • sectors with < 2 members → bleed alerts suppressed
#   • dip_overrides keys must be valid dip_scanner parameter names
#
# DATA QUALITY NOTES
#   GC=F      Gold continuous futures roll monthly — price gaps expected on roll
#             dates. yfinance returns the front-month contract.
#   NVO       Novo Nordisk ADR (NYSE). Primary listing is NOVO-B on Copenhagen.
#             yfinance NVO returns ADR data; volume differs from primary.
#   SNDK      Post-spin SanDisk Corp. (spun from WD in 2024). ATH-based dip logic
#             unreliable until ~12 months of post-spin price history accumulates.
#   MSTR      BTC treasury company, not a miner. Sector: Crypto-Adj.
#   COIN      Crypto exchange, not a miner. Sector: Crypto-Adj.
#   UAMY      Micro-cap (~$50M). Alerts will fire often on thin volume.
#   WGRX      Small-cap healthcare. No dip role — thin history, ATH math unreliable.
#   DRAM      CBOE-listed. Launched 2026-04-02. ~$9.8B AUM in 43 days (record).
#             Heavy Korea exposure (~49%): Samsung + SK Hynix. Acts as HBM/memory
#             bleed signal alongside MU. Volatility profile similar to MU but
#             more concentrated — use standard dip thresholds.
#   NASA      NYSE Arca-listed. Launched 2026-03-30. Tema Space Innovators ETF.
#             Only space ETF with SpaceX exposure (via SPV). SpaceX slice is
#             valued at transaction cost in daily NAV — will appear flat until
#             Tema transacts or SpaceX IPOs. Use as sector bleed signal, not
#             as a pure-price alert vehicle. SpaceX IPO expected mid-2026;
#             post-IPO the SPV converts to freely traded shares.
#   XIU.TO    TSX-listed, CAD-denominated. yfinance requires ".TO" suffix.
#   XIC.TO    Same as above. ~240 holdings; broader than XIU.TO.
#   ZEB.TO    Equal-weight Canadian Big 6 banks. CAD-denominated.
#             All Canadian ETFs use session: regular (TSX hours = 09:30–16:00 ET).
#   SLV       Silver ETF — asset_class: etf (not commodity), trades like a stock
#             in yfinance. No futures roll gaps.
#   QTUM      Defiance Quantum ETF — best liquid benchmark for Quantum sector bleed.
#   SOXX      iShares Semiconductor ETF — sector benchmark for AI/Semis bleed math.
#   IBIT      iShares Bitcoin Trust (spot BTC ETF) — cleaner BTC price signal than
#             GC=F analog; no roll gaps, regular session hours.
#   URNM      Sprott Uranium Miners ETF — Nuclear/Energy sector bleed anchor.
#
# CHANGELOG
#   v5.0  2026-05  New sectors: Cybersecurity, Space, Data Center.
#                  Added ETF asset_class; ETFs get roles intel+brief (not dip).
#                  Added ETFs: DRAM (AI/Semis memory), NASA (Space), SOXX (AI/Semis),
#                    IBIT (Crypto-Adj), URNM (Nuclear/Energy), QTUM (Quantum).
#                  Added Canadian ETFs: XIU.TO, XIC.TO, ZEB.TO (new "Canada" sector).
#                  Added Cybersecurity stocks: PANW, S, ZS (CRWD moved from AI Software).
#                  Added Space stocks: RKLB, LUNR (NASA ETF anchors the sector).
#                  Added Data Center REITs: EQIX, DLR (new sector).
#                  Added volatility-adjusted dip_overrides on all high/low-beta entries.
#                  Added dip_tiers presets to settings for reference.
#                  Sector "Canada" added to sectors_canonical.
#                  Sector "Cybersecurity" added to sectors_canonical.
#                  Sector "Space" added to sectors_canonical.
#                  Sector "Data Center" added to sectors_canonical.
#                  CRWD moved from AI Software → Cybersecurity.
#   v4.0  2025-05  Full audit. 11 emoji conflicts fixed. MSTR/COIN sector corrected.
#                  Singleton sectors patched (RIVN, DIS, SLV, MP added).
#                  dip_scanner thresholds tightened. "Financials" eliminated.
#   v3.0  prior    Original release.
#
# ═══════════════════════════════════════════════════════════════════════════════

