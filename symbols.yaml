# ═══════════════════════════════════════════════════════════════════════════════
# SCANNER SETTINGS
# ═══════════════════════════════════════════════════════════════════════════════
settings:

  intel:
    big_drop_warn:        -5.0    # % intraday drop → WARN
    big_drop_critical:   -10.0    # % intraday drop → CRITICAL
    big_gain_alert:        8.0    # % intraday gain → alert
    cooldown_hours:        4
    sector_bleed_cooldown: 4
    leadership_cooldown:   3

  brief:
    morning_window:  ["08:45", "12:00"]   # ET
    evening_window:  ["16:15", "20:00"]   # ET
    fetch_workers:   5

  dip_scanner:
    # ── Global defaults (apply when no dip_overrides on the entry) ───────────
    rsi_min:        25      # below = capitulation, not dip
    rsi_max:        42      # was 48 in v3; tightened — catches real dips not noise
    drop_1d_max:    -2.0    # min 1-day drop % to qualify
    drop_5d_max:    -4.0    # min 5-day drop % to qualify
    ath_min:        -30.0   # must be within 30% of ATH
    vol_ratio_min:   0.6    # current vol / avg vol
    cooldown_hours:  8
    fetch_workers:   5
    max_loss_pct:    8.0

    # ── Volatility tier presets (REFERENCE ONLY — not parsed by loader) ──────
    # These document the dip_overrides values used on high/low-beta entries.
    # Copy the appropriate block into a universe entry's dip_overrides field.
    # The loader reads dip_overrides per-entry; this block is for human reference.
    #
    # dip_tiers:
    #   high_beta:            # Quantum, Crypto Mining, EV/Auto, Space small-caps
    #     rsi_max:       48
    #     drop_1d_max:  -4.0
    #     drop_5d_max: -10.0
    #     max_loss_pct: 15.0
    #
    #   very_high_beta:       # Most speculative (QUBT, LUNR, RGTI, RIOT, MARA)
    #     rsi_max:       50
    #     drop_1d_max:  -6.0
    #     drop_5d_max: -15.0
    #     max_loss_pct: 25.0
    #
    #   low_beta:             # REITs, large-cap banks, Safe Haven ETFs
    #     rsi_max:       38
    #     drop_1d_max:  -1.5
    #     drop_5d_max:  -3.5
    #     max_loss_pct:  6.0


