# ═══════════════════════════════════════════════════════════════════════════════
# CANONICAL SECTOR LIST
# ═══════════════════════════════════════════════════════════════════════════════
#
# Loader rejects any universe entry whose sector is not in this list.
# Every sector listed here must have ≥ 2 universe members for bleed/leadership
# math to produce meaningful signals. Sectors with 1 member will still alert
# on intel/brief but bleed correlations will be suppressed by the scanner.
#
# To add a sector: add it here AND ensure ≥ 2 stocks reference it.
# To remove a sector: remove all universe entries first, then remove from here.
#
# ═══════════════════════════════════════════════════════════════════════════════
sectors_canonical:
  - "Crypto"          # BTC, ETH, XRP
  - "Crypto Mining"   # IREN, MARA, RIOT
  - "Crypto-Adj"      # MSTR, COIN, SOFI, HOOD  (crypto-correlated equities)
  - "Safe Haven"      # GC=F, SLV
  - "Mega Tech"       # AAPL, MSFT, GOOGL, META, AMZN
  - "AI / Semis"      # NVDA, AMD, MU, TSM, ASML, AVGO, MRVL, ARM, ANET, SMCI, SNDK, NBIS
  - "AI Software"     # PLTR, CRM, ADBE, ORCL, SNOW, NOW, DDOG, CRWD, APP, DUOL
  - "Quantum"         # IONQ, RGTI, QBTS, QUBT
  - "Nuclear / Energy" # OKLO, CEG, VST, SMR, NNE
  - "Fintech"         # JPM, V, MA, AXP, SOFI*, HOOD*  (*also Crypto-Adj)
  - "EV / Auto"       # TSLA, RIVN
  - "Streaming"       # NFLX, DIS
  - "Healthcare"      # LLY, NVO, REGN, WGRX
  - "Consumer"        # SHOP, UBER, SPOT, COST, CAVA
  - "Materials"       # UAMY, MP


# ═══════════════════════════════════════════════════════════════════════════════
# SCANNER SETTINGS
# ═══════════════════════════════════════════════════════════════════════════════
#
# Applied at startup by the loader. Any key not present falls back to the
# dataclass default in code. All thresholds are percentages unless noted.
#
# ═══════════════════════════════════════════════════════════════════════════════
settings:

  intel:
    big_drop_warn:        -5.0    # % intraday drop → WARN alert
    big_drop_critical:   -10.0    # % intraday drop → CRITICAL alert
    big_gain_alert:        8.0    # % intraday gain → alert
    cooldown_hours:        4      # min hours between repeat alerts per symbol
    sector_bleed_cooldown: 4      # min hours between sector bleed alerts
    leadership_cooldown:   3      # min hours between sector leadership alerts

  brief:
    morning_window:  ["08:45", "12:00"]   # ET — digest sent once in this window
    evening_window:  ["16:15", "20:00"]   # ET — digest sent once in this window
