# ═══════════════════════════════════════════════════════════════
# ALPHAEDGE UNIVERSE CONFIGURATION  v3.0
# ═══════════════════════════════════════════════════════════════
# Single source of truth for ALL scanners.
# Edit here → restart any scanner → changes take effect.
#
# Schema (per stock):
#   symbol:     "TICKER"            (yfinance-compatible — required)
#   name:       "Company Inc."      (used in brief headers — required)
#   exchange:   "NASDAQ" | "NYSE" | "CRYPTO" | "COMEX"
#   asset_class: "stock" | "crypto" | "commodity"   (drives session logic)
#   emoji:      "💎"                (single emoji for Telegram — required)
#   sector:     "AI / Semis"        (PRIMARY — used for bleed/leadership)
#   tags:       ["Crypto-Adj"]      (secondary classifications, optional)
#   roles:      ["intel","brief","dip"]   (which scanners include this)
#   session:    "regular" | "extended" | "24h"
#
# Validation rules (enforced by loader):
#   • symbol must be unique
#   • emoji length must be 1–2 chars
#   • sector must be in `sectors_canonical` list at the bottom
#   • asset_class ∈ {stock, crypto, commodity}
#   • roles must be subset of {intel, brief, dip, scanner}
# ═══════════════════════════════════════════════════════════════

schema_version: 3

