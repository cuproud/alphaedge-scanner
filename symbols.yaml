  - "Crypto"             # BTC-USD, ETH-USD, XRP-USD
  - "Crypto Mining"      # IREN, MARA, RIOT
  - "Crypto-Adj"         # MSTR, COIN, SOFI, HOOD, IBIT
  - "Safe Haven"         # GC=F, SLV
  - "Mega Tech"          # AAPL, MSFT, GOOGL, META, AMZN
  - "AI / Semis"         # NVDA, AMD, MU, TSM, ASML, AVGO, MRVL, ARM, ANET, SMCI, SNDK, NBIS, SOXX, DRAM
  - "AI Software"        # PLTR, CRM, ADBE, ORCL, SNOW, NOW, DDOG, APP, DUOL
  - "Cybersecurity"      # CRWD, PANW, S, ZS
  - "Quantum"            # IONQ, RGTI, QBTS, QUBT, QTUM
  - "Nuclear / Energy"   # OKLO, CEG, VST, SMR, NNE, URNM
  - "Space"              # RKLB, LUNR, NASA
  - "Data Center"        # EQIX, DLR
  - "Fintech"            # JPM, V, MA, AXP
  - "EV / Auto"          # TSLA, RIVN
  - "Streaming"          # NFLX, DIS
