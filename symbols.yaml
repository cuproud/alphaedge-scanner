    vol_ratio_min:   0.6    # current vol / avg vol — screens out dead-air dips
    cooldown_hours:  8      # was 4 — raised to reduce dip alert spam
    fetch_workers:   5
    max_loss_pct:    8.0    # max drawdown from entry before stop-loss flag


